name: Stats report

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 09:00 МСК, ежедневно
  workflow_dispatch: {}    # ручной запуск (для теста)

permissions:
  contents: write          # для коммита истории stats/history.jsonl

concurrency:
  group: stats-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build report + send to Telegram
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/stats_report.py

      - name: Commit history snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/history.jsonl
          git commit -m "stats: daily snapshot" || echo "no changes to commit"
          git push
